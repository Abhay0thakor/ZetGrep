<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZetGrep TERMINAL v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Fira Sans', 'sans-serif'], mono: ['Fira Code', 'monospace'] },
                    colors: { 
                        cyber: { 
                            primary: '#00FF41', 
                            dim: 'rgba(0, 255, 65, 0.1)', 
                            dark: '#050505', 
                            panel: '#0a0a0a', 
                            border: '#1a1a1a',
                            alert: '#FF003C' 
                        } 
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000; color: #e0e0e0; }
        .cyber-border { border: 1px solid #1a1a1a; position: relative; }
        .cyber-border::before { content: ''; position: absolute; top: -1px; left: -1px; width: 8px; height: 8px; border-top: 2px solid #00FF41; border-left: 2px solid #00FF41; }
        .cyber-border::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-bottom: 2px solid #00FF41; border-right: 2px solid #00FF41; }
        
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; z-index: 50; opacity: 0.15; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border: 1px solid #00FF41; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00FF41; }
        
        .glow-text { text-shadow: 0 0 5px rgba(0, 255, 65, 0.5); }
        .match-highlight { color: #000; background-color: #00FF41; font-weight: bold; padding: 0 2px; }
    </style>
</head>
<body class="font-sans h-full overflow-hidden flex flex-col selection:bg-cyber-primary selection:text-black" x-data="app()">
    
    <div class="scanlines"></div>

    <!-- Top Command Bar -->
    <header class="h-16 bg-cyber-dark border-b border-cyber-border flex items-center px-6 gap-6 flex-shrink-0 z-40 relative">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-cyber-primary flex items-center justify-center font-black text-black text-lg font-mono">Z_</div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-widest leading-none font-mono glow-text">ZET<span class="text-cyber-primary">GREP</span></h1>
                <p class="text-[9px] text-cyber-primary uppercase tracking-[0.2em] opacity-70">System Ready</p>
            </div>
        </div>

        <div class="h-8 w-px bg-cyber-border"></div>

        <!-- Target Input -->
        <div class="flex-1 flex items-center gap-4">
            <div class="flex-1 relative group cyber-border bg-cyber-panel h-10 flex items-center">
                <span class="pl-3 text-cyber-primary font-mono text-xs opacity-50">TARGET:</span>
                <input type="text" x-model="targetPath" @keydown.enter="runScan" class="flex-1 bg-transparent border-none outline-none text-sm font-mono text-white px-3 placeholder:text-gray-700" placeholder="/path/to/scan or file.log">
            </div>

            <div class="w-48 relative group cyber-border bg-cyber-panel h-10 flex items-center">
                <span class="pl-3 text-cyber-primary font-mono text-xs opacity-50">SESSION:</span>
                <input type="text" x-model="saveAs" class="w-full bg-transparent border-none outline-none text-sm font-mono text-white px-3 placeholder:text-gray-700" placeholder="scan_01">
            </div>

            <button @click="runScan" 
                    class="h-10 px-8 font-mono text-xs font-bold uppercase tracking-widest transition-all hover:bg-cyber-primary hover:text-black border border-cyber-primary flex items-center gap-2"
                    :class="scanning ? 'bg-cyber-alert border-cyber-alert text-white animate-pulse' : 'text-cyber-primary'">
                <span x-text="scanning ? 'ABORT SEQUENCE' : 'EXECUTE SCAN'"></span>
            </button>
        </div>

        <!-- Toggles -->
        <div class="flex items-center gap-4 font-mono text-[10px]">
            <label class="flex items-center gap-2 cursor-pointer select-none group">
                <div class="w-3 h-3 border border-cyber-primary flex items-center justify-center transition-colors" :class="smartMode ? 'bg-cyber-primary' : ''">
                    <div x-show="smartMode" class="w-1.5 h-1.5 bg-black"></div>
                </div>
                <span :class="smartMode ? 'text-cyber-primary glow-text' : 'text-gray-500'">AI_FILTER</span>
                <input type="checkbox" x-model="smartMode" class="hidden">
            </label>
            
            <label class="flex items-center gap-2 cursor-pointer select-none group">
                <div class="w-3 h-3 border border-cyber-primary flex items-center justify-center transition-colors" :class="entropyMode ? 'bg-cyber-primary' : ''">
                    <div x-show="entropyMode" class="w-1.5 h-1.5 bg-black"></div>
                </div>
                <span :class="entropyMode ? 'text-cyber-primary glow-text' : 'text-gray-500'">ENTROPY</span>
                <input type="checkbox" x-model="entropyMode" class="hidden">
            </label>

            <div class="h-6 w-px bg-cyber-border mx-2"></div>

            <label class="flex items-center gap-2 cursor-pointer select-none group">
                <div class="w-3 h-3 border border-cyber-primary flex items-center justify-center transition-colors" :class="jsonlMode ? 'bg-cyber-primary' : ''">
                    <div x-show="jsonlMode" class="w-1.5 h-1.5 bg-black"></div>
                </div>
                <span :class="jsonlMode ? 'text-cyber-primary glow-text' : 'text-gray-500'">JSONL_MODE</span>
                <input type="checkbox" x-model="jsonlMode" class="hidden">
            </label>
        </div>
    </header>

    <!-- JSONL Config Panel -->
    <div x-show="jsonlMode" x-cloak class="bg-cyber-panel border-b border-cyber-border p-3 flex items-center justify-center gap-8 z-30 font-mono text-xs">
        <div class="flex items-center gap-2">
            <span class="text-cyber-primary">TARGET_FIELD:</span>
            <input type="text" x-model="jsonlConfig.target" class="bg-black border border-cyber-border text-white px-2 py-1 outline-none focus:border-cyber-primary w-32">
        </div>
        <div class="flex items-center gap-2">
            <span class="text-cyber-primary">ID_FIELD:</span>
            <input type="text" x-model="jsonlConfig.id" class="bg-black border border-cyber-border text-white px-2 py-1 outline-none focus:border-cyber-primary w-32">
        </div>
        <label class="flex items-center gap-2 cursor-pointer">
            <span class="text-cyber-primary">DECODE:</span>
            <input type="checkbox" x-model="jsonlConfig.decode" class="accent-cyber-primary">
        </label>
    </div>

    <div class="flex-1 flex overflow-hidden z-10">
        <!-- Sidebar -->
        <aside class="w-64 bg-cyber-dark border-r border-cyber-border flex flex-col font-mono">
            <div class="flex border-b border-cyber-border">
                <button @click="sideTab = 'patterns'" class="flex-1 py-3 text-[10px] uppercase font-bold hover:bg-cyber-dim hover:text-cyber-primary transition-colors" :class="sideTab === 'patterns' ? 'bg-cyber-dim text-cyber-primary border-b-2 border-cyber-primary' : 'text-gray-500'">Patterns</button>
                <button @click="sideTab = 'tools'" class="flex-1 py-3 text-[10px] uppercase font-bold hover:bg-cyber-dim hover:text-cyber-primary transition-colors" :class="sideTab === 'tools' ? 'bg-cyber-dim text-cyber-primary border-b-2 border-cyber-primary' : 'text-gray-500'">Tools</button>
                <button @click="sideTab = 'history'" class="flex-1 py-3 text-[10px] uppercase font-bold hover:bg-cyber-dim hover:text-cyber-primary transition-colors" :class="sideTab === 'history' ? 'bg-cyber-dim text-cyber-primary border-b-2 border-cyber-primary' : 'text-gray-500'">Logs</button>
            </div>

            <!-- Patterns -->
            <div x-show="sideTab === 'patterns'" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <input type="text" x-model="patternSearch" placeholder="SEARCH_DB..." class="w-full bg-black border border-cyber-border text-xs p-2 mb-2 text-cyber-primary outline-none focus:border-cyber-primary placeholder:text-gray-800">
                <div class="flex justify-between px-1 mb-2 text-[9px] text-gray-500 font-bold uppercase">
                    <span x-text="patterns.length + ' MODULES'"></span>
                    <button @click="selectAllPatterns" class="hover:text-cyber-primary">[ALL]</button>
                </div>
                <template x-for="pat in filteredPatterns" :key="pat">
                    <button @click="togglePattern(pat)" class="w-full text-left px-3 py-2 text-xs flex justify-between group hover:bg-cyber-dim" :class="selectedPatterns.includes(pat) ? 'text-cyber-primary bg-cyber-dim/50' : 'text-gray-400'">
                        <span x-text="pat"></span>
                        <span x-show="selectedPatterns.includes(pat)" class="text-[10px]">[X]</span>
                    </button>
                </template>
            </div>

            <!-- Tools -->
            <div x-show="sideTab === 'tools'" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
                <template x-for="t in tools" :key="t.id">
                    <div class="p-3 border border-cyber-border bg-black hover:border-cyber-primary transition-colors group cursor-default">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-xs font-bold text-cyber-primary group-hover:glow-text" x-text="t.name"></span>
                            <span class="text-[9px] text-gray-600 font-bold" x-text="t.id"></span>
                        </div>
                        <p class="text-[9px] text-gray-500 mb-2 leading-tight" x-text="t.description"></p>
                        <code class="block text-[8px] text-gray-400 bg-gray-900/50 p-1 font-mono truncate" x-text="t.command"></code>
                    </div>
                </template>
            </div>

            <!-- History -->
            <div x-show="sideTab === 'history'" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <template x-for="file in history" :key="file">
                    <button @click="loadHistory(file)" class="w-full text-left p-3 text-xs font-mono border border-transparent hover:border-cyber-primary hover:bg-cyber-dim transition-all text-gray-400 hover:text-white truncate" :class="loadedFile === file ? 'border-cyber-primary text-cyber-primary' : ''">
                        <span x-text="file"></span>
                    </button>
                </template>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-[#050505] relative">
            <!-- Data HUD -->
            <div class="h-12 border-b border-cyber-border bg-cyber-dark flex items-center px-4 justify-between">
                <div class="flex gap-2 overflow-x-auto custom-scrollbar max-w-2xl no-scrollbar">
                    <button @click="switchTab('all')" class="px-4 py-1 text-[10px] font-bold uppercase border border-transparent hover:border-cyber-primary transition-all flex items-center gap-2" :class="activeTab === 'all' ? 'bg-cyber-primary text-black border-cyber-primary' : 'text-gray-500 bg-black border-cyber-border'">
                        <span>GLOBAL_FEED</span>
                        <span class="bg-black/20 px-1.5 rounded text-[9px]" x-text="results.length"></span>
                    </button>
                    <button @click="switchTab('intel')" class="px-4 py-1 text-[10px] font-bold uppercase border border-transparent hover:border-cyber-primary transition-all flex items-center gap-2" :class="activeTab === 'intel' ? 'bg-cyber-alert text-white border-cyber-alert' : 'text-gray-500 bg-black border-cyber-border'">
                        <span>INTEL_HITS</span>
                        <span class="bg-black/20 px-1.5 rounded text-[9px]" x-text="intelCount"></span>
                    </button>
                    <div class="w-px h-6 bg-cyber-border mx-2"></div>
                    <template x-for="pat in selectedPatternsSorted" :key="pat">
                        <button @click="switchTab(pat)" class="px-3 py-1 text-[10px] font-mono border border-cyber-border hover:text-cyber-primary hover:border-cyber-primary transition-all whitespace-nowrap" :class="activeTab === pat ? 'text-cyber-primary border-cyber-primary' : 'text-gray-500'">
                            <span x-text="pat"></span>
                            <span class="ml-1 text-[9px] opacity-50" x-text="resultCounts[pat] || 0"></span>
                        </button>
                    </template>
                </div>
                
                <div class="flex items-center gap-3">
                    <input type="text" x-model="resultFilter" placeholder="FILTER_RESULTS..." class="bg-black border border-cyber-border text-xs px-2 py-1 text-white outline-none focus:border-cyber-primary font-mono w-48">
                    <button @click="exportResults" class="p-1.5 hover:text-cyber-primary text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2"></path></svg></button>
                </div>
            </div>

            <!-- Results Stream -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-2 font-mono text-sm" @scroll="handleScroll" id="results-scroll">
                <template x-for="res in visibleResults" :key="res.id">
                    <div class="bg-black border-l-2 border-cyber-border pl-4 py-2 hover:bg-cyber-dim/20 hover:border-cyber-primary transition-colors group relative">
                        <div class="flex justify-between items-start mb-1 opacity-70 group-hover:opacity-100">
                            <div class="flex items-center gap-3 text-[10px] uppercase">
                                <span class="text-cyber-primary font-bold" x-text="res.pattern"></span>
                                <span class="text-gray-600">|</span>
                                <span class="text-gray-400 cursor-pointer hover:text-white truncate max-w-md" @click="copyToClipboard(res.file)" x-text="res.file + ':' + res.line"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span x-show="res.entropy > 4.5" class="text-cyber-alert font-bold text-[9px]">HIGH_ENTROPY</span>
                                
                                <!-- Quick Actions -->
                                <div class="relative" x-data="{ open: false }">
                                    <button @click="open = !open" class="text-[9px] text-cyber-primary hover:glow-text font-bold">[RUN_TOOL]</button>
                                    <div x-show="open" @click.away="open = false" class="absolute right-0 top-full mt-1 w-48 bg-cyber-dark border border-cyber-border z-50">
                                        <template x-for="t in tools" :key="t.id">
                                            <button @click="runTool(t.id, res); open = false" class="w-full text-left px-3 py-2 text-[10px] text-gray-400 hover:bg-cyber-primary hover:text-black uppercase" x-text="t.name"></button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="text-gray-300 break-all leading-relaxed pl-2 border-l border-gray-800 group-hover:border-cyber-primary/30 transition-colors" x-html="highlightMatch(res.content, res.matches)"></div>

                        <!-- Tool Output -->
                        <template x-if="res.tool_data && res.tool_data.length > 0">
                            <div class="mt-2 pl-2 space-y-1">
                                <template x-for="td in res.tool_data">
                                    <div class="bg-gray-900/50 p-2 border-l-2 border-cyber-primary text-xs">
                                        <div class="text-[9px] text-cyber-primary mb-0.5 font-bold uppercase" x-text="td.label"></div>
                                        <div class="text-gray-400 whitespace-pre-wrap" x-text="td.value"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <div x-show="visibleResults.length === 0 && !scanning" class="h-64 flex flex-col items-center justify-center opacity-30">
                    <div class="text-4xl font-black text-cyber-primary mb-2">NO_DATA</div>
                    <div class="text-xs uppercase tracking-widest">Waiting for input stream...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Status Bar / Toast -->
    <div class="fixed bottom-4 right-4 flex flex-col gap-2 z-50">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="bg-cyber-dark border border-cyber-primary px-4 py-2 text-xs font-mono text-cyber-primary shadow-[0_0_10px_rgba(0,255,65,0.3)] animate-[slide-in_0.2s_ease-out] flex items-center gap-2">
                <div class="w-2 h-2 bg-cyber-primary animate-pulse"></div>
                <span x-text="toast.msg"></span>
            </div>
        </template>
    </div>

    <script>
        function app() {
            return {
                version: 'v4.4.0', scanning: false, loadingFile: false, loadedFile: null, targetPath: '.', saveAs: '', smartMode: false, entropyMode: false, 
                jsonlMode: false, jsonlConfig: { target: 'body', id: 'url', decode: false },
                sideTab: 'patterns', activeTab: 'all', selectedToolIDs: [], patterns: [], selectedPatterns: [], results: [], history: [], tools: [],
                resultFilter: '', pageSize: 50, page: 1, batch: [], toasts: [],
                filters: { minEntropy: 0, ext: '' },

                init() {
                    this.fetchPatterns(); this.fetchHistory(); this.fetchTools();
                    setInterval(() => { if (this.batch.length > 0) { this.results = [...this.results, ...this.batch]; this.batch = []; } }, 150);
                },
                addToast(msg) { const id = Date.now(); this.toasts.push({ id, msg: msg.toUpperCase() }); setTimeout(() => this.toasts = this.toasts.filter(t => t.id !== id), 3000); },
                async fetchPatterns() { try { const r = await fetch('/api/patterns'); this.patterns = await r.json() || []; } catch(e){} },
                async fetchHistory() { try { const r = await fetch('/api/history'); this.history = await r.json() || []; } catch(e){} },
                async fetchTools() { try { const r = await fetch('/api/tools'); this.tools = await r.json() || []; } catch(e){} },
                
                get filteredResults() {
                    let f = this.results;
                    if (this.activeTab === 'intel') f = f.filter(r => r.tool_data?.length > 0);
                    else if (this.activeTab !== 'all') f = f.filter(r => r.pattern === this.activeTab);
                    if (this.resultFilter) {
                        const q = this.resultFilter.toLowerCase();
                        f = f.filter(r => r.file.toLowerCase().includes(q) || r.content.toLowerCase().includes(q) || r.tool_data?.some(td => td.value.toLowerCase().includes(q)));
                    }
                    return f;
                },

                get visibleResults() { return this.filteredResults.slice(0, this.page * this.pageSize); },
                get hasMore() { return this.filteredResults.length > this.page * this.pageSize; },
                get resultCounts() { return this.results.reduce((acc, r) => { acc[r.pattern] = (acc[r.pattern] || 0) + 1; return acc; }, {}); },
                get filteredPatterns() { return this.patterns.filter(p => p.toLowerCase().includes(this.patternSearch.toLowerCase())).sort(); },
                get selectedPatternsSorted() { return [...this.selectedPatterns].sort(); },
                get intelCount() { return this.results.filter(r => r.tool_data?.length > 0).length; },

                async runTool(id, res) {
                    try {
                        const r = await fetch(`/api/tools/run?id=${id}`, { method: 'POST', body: JSON.stringify(res) });
                        const d = await r.json();
                        if (d.value) {
                            if (!res.tool_data) res.tool_data = [];
                            res.tool_data = res.tool_data.filter(x => x.tool_id !== id);
                            res.tool_data.push(d);
                            this.addToast(`EXECUTED: ${d.label}`);
                        }
                    } catch(e) { this.addToast("PLUGIN FAULT"); }
                },

                loadMore() { this.page++; },
                handleScroll(e) { if (e.target.scrollHeight - e.target.scrollTop < e.target.clientHeight + 300 && this.hasMore) this.loadMore(); },
                switchTab(tab) { this.activeTab = tab; this.page = 1; this.$nextTick(() => { const el = document.getElementById('results-scroll'); if (el) el.scrollTop = 0; }); },
                togglePattern(pat) { if (this.selectedPatterns.includes(pat)) this.selectedPatterns = this.selectedPatterns.filter(p => p !== pat); else this.selectedPatterns.push(pat); },
                selectAllPatterns() { this.selectedPatterns = [...this.patterns]; },
                
                runScan() {
                    if (this.scanning) { if (this.eventSource) { this.eventSource.close(); this.eventSource = null; } this.scanning = false; return; }
                    if (this.selectedPatterns.length === 0) { this.addToast("SELECT PATTERNS"); return; }
                    this.scanning = true; this.results = []; this.batch = []; this.page = 1; this.loadedFile = null;
                    const params = new URLSearchParams({ 
                        path: this.targetPath, 
                        saveAs: this.saveAs, 
                        smart: this.smartMode, 
                        entropy: this.entropyMode, 
                        patterns: this.selectedPatterns.join(','), 
                        tools: this.selectedToolIDs.join(','),
                        jsonl: this.jsonlMode,
                        jsonlTarget: this.jsonlConfig.target,
                        jsonlId: this.jsonlConfig.id,
                        jsonlDecode: this.jsonlConfig.decode
                    });
                    this.eventSource = new EventSource(`/api/scan?${params}`);
                    this.eventSource.onmessage = (e) => { const d = JSON.parse(e.data); this.batch.push(d); };
                    this.eventSource.addEventListener('done', () => { this.eventSource.close(); this.scanning = false; this.addToast("SCAN COMPLETE"); this.fetchHistory(); });
                    this.eventSource.onerror = () => { this.eventSource.close(); this.scanning = false; };
                },

                async loadHistory(file) {
                    this.loadingFile = true; this.results = []; this.batch = []; this.page = 1; this.loadedFile = file;
                    try {
                        const r = await fetch(`/api/history/load?file=${file}`);
                        const d = await r.json(); this.results = d.map((x, i) => ({ ...x, id: i }));
                        this.selectedPatterns = [...new Set(this.results.map(x => x.pattern))];
                        this.activeTab = 'all'; this.addToast("LOG LOADED");
                    } catch(e) { this.addToast("LOAD ERROR"); } finally { this.loadingFile = false; }
                },

                exportResults() {
                    const data = JSON.stringify(this.results, null, 2);
                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `scan_export_${Date.now()}.json`;
                    a.click();
                    this.addToast("DATA EXPORTED");
                },

                highlightMatch(content, matches) {
                    if (!matches || matches.length === 0) return this.escapeHtml(content);
                    let h = this.escapeHtml(content);
                    [...new Set(matches)].sort((a,b) => b.length - a.length).forEach(m => { h = h.replaceAll(this.escapeHtml(m), `<span class="match-highlight">${this.escapeHtml(m)}</span>`); });
                    return h;
                },
                escapeHtml(str) { return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : ""; },
                copyToClipboard(t) { navigator.clipboard.writeText(t); this.addToast("COPIED TO CLIPBOARD"); }
            }
        }
    </script>
</body>
</html>
